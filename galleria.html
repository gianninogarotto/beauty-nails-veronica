<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria – Beauty&Nails di Veronica</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* --- LIGHTBOX --- */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: rgba(0,0,0,0.8);
        }

        .lightbox-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            transition: transform 0.2s ease;
            cursor: grab;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- FADE-IN ANIMATION --- */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- GALLERIA MASONRY (Pinterest style) --- */
        .gallery {
            column-count: 3;
            column-gap: 15px;
            width: 90%;
            margin: auto;
        }

        .gallery img {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 10px;
            display: block;
            break-inside: avoid;
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .gallery {
                column-count: 2;
            }
        }

        @media (max-width: 600px) {
            .gallery {
                column-count: 1;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Beauty&Nails di Veronica</h1>
    <nav>
        <a href="index3.html">Home</a>
        <a href="galleria.html" class="active">Galleria</a>
        <a href="index3.html#servizi">Servizi</a>
        <a href="index3.html#contatti">Contatti</a>
    </nav>
</header>

<section class="section">
    <h2>Galleria Fotografica</h2>
    <p>Le foto si caricano automaticamente dalla cartella <b>gallery/</b>.</p>

    <div class="gallery" id="gallery"></div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
</div>

<footer>
    <p>© 2025 Beauty&Nails di Veronica – Tutti i diritti riservati</p>
</footer>

<script>
    const galleryContainer = document.getElementById("gallery");

    // Lista dei formati accettati
    const validExtensions = ["jpg", "jpeg", "png", "webp"];

    // Carica automaticamente le foto dalla cartella gallery/
    for (let i = 1; i <= 200; i++) {
        validExtensions.forEach(ext => {
            const imgPath = `gallery/foto${i}.${ext}`;
            const img = new Image();
            img.src = imgPath;

            img.onload = () => {
                const element = document.createElement("img");
                element.src = imgPath;
                galleryContainer.appendChild(element);
            };
        });
    }

    // LIGHTBOX + ZOOM + DRAG
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn = document.querySelector('.lightbox-close');

    let scale = 1;
    let isDragging = false;
    let startX, startY, currentX = 0, currentY = 0;

    galleryContainer.addEventListener("click", (e) => {
        if (e.target.tagName === "IMG") {
            lightbox.style.display = "block";
            lightboxImg.src = e.target.src;

            scale = 1;
            currentX = 0;
            currentY = 0;
            lightboxImg.style.transform = "translate(0px, 0px) scale(1)";

            lightboxImg.classList.remove("fade-in");
            void lightboxImg.offsetWidth;
            lightboxImg.classList.add("fade-in");
        }
    });

    lightboxImg.addEventListener("wheel", (e) => {
        e.preventDefault();
        const zoomAmount = 0.1;

        if (e.deltaY < 0) scale += zoomAmount;
        else if (scale > 1) scale -= zoomAmount;

        lightboxImg.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;
    });

    lightboxImg.addEventListener("mousedown", (e) => {
        if (scale <= 1) return;
        isDragging = true;
        startX = e.clientX - currentX;
        startY = e.clientY - currentY;
        lightboxImg.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        currentX = e.clientX - startX;
        currentY = e.clientY - startY;
        lightboxImg.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;
    });

    window.addEventListener("mouseup", () => {
        isDragging = false;
        lightboxImg.style.cursor = "grab";
    });

    closeBtn.onclick = () => lightbox.style.display = "none";
    lightbox.onclick = (e) => {
        if (e.target === lightbox) lightbox.style.display = "none";
    };
</script>

</body>
</html>
